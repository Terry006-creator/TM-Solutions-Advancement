<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TM Solutions - Kenya's Trusted Electronics Store</title>
    <style>
        /* ========================================
           🛍️ JUMIA/KILIMALL STYLE CSS
           ======================================== */

        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ---------- TOP BAR (Like Jumia) ---------- */
        .top-bar {
            background: #1a2332;
            color: #fff;
            font-size: 0.8rem;
            padding: 6px 0;
            border-bottom: 2px solid #f59e0b;
        }

        .top-bar .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .top-bar .location {
            color: #f59e0b;
            font-weight: 600;
        }

        .top-bar .location i { margin-right: 5px; }

        .top-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .top-links a {
            color: #ccc;
            transition: color 0.3s;
            font-size: 0.8rem;
        }

        .top-links a:hover {
            color: #f59e0b;
        }

        /* ---------- MAIN HEADER ---------- */
        .main-header {
            background: #fff;
            padding: 12px 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .main-header .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a2332;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .logo span {
            color: #f59e0b;
        }

        .logo .tagline {
            font-size: 0.6rem;
            font-weight: 400;
            color: #888;
            display: block;
            margin-top: -4px;
        }

        /* ---------- SEARCH BAR (Jumia Style) ---------- */
        .search-bar {
            flex: 1;
            display: flex;
            min-width: 200px;
            max-width: 600px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            border-right: none;
            border-radius: 8px 0 0 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-bar input:focus {
            border-color: #f59e0b;
        }

        .search-bar button {
            background: #f59e0b;
            border: none;
            padding: 10px 24px;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-weight: 700;
            color: #fff;
            transition: background 0.3s;
            font-size: 0.95rem;
        }

        .search-bar button:hover {
            background: #d97706;
        }

        /* ---------- HEADER ACTIONS ---------- */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            white-space: nowrap;
        }

        .header-actions a {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #333;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .header-actions a:hover {
            color: #f59e0b;
        }

        .header-actions .cart {
            background: #f59e0b;
            color: #fff;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 700;
        }

        .header-actions .cart:hover {
            background: #d97706;
            color: #fff;
        }

        .cart-count {
            background: #e53e3e;
            color: #fff;
            border-radius: 50%;
            padding: 0 8px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: -4px;
        }

        /* ---------- CATEGORY NAV (Like Jumia) ---------- */
        .category-nav {
            background: #fff;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 0;
            position: sticky;
            top: 76px;
            z-index: 999;
        }

        .category-nav .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            gap: 25px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .category-nav .container::-webkit-scrollbar {
            display: none;
        }

        .category-nav a {
            padding: 12px 0;
            font-size: 0.85rem;
            font-weight: 500;
            color: #555;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .category-nav a:hover {
            color: #f59e0b;
            border-bottom-color: #f59e0b;
        }

        .category-nav .all-categories {
            color: #1a2332;
            font-weight: 700;
        }

        /* ---------- HERO / BANNER (Kilimall Style) ---------- */
        .hero-banner {
            max-width: 1280px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .hero-banner .banner-slide {
            background: linear-gradient(135deg, #1a2332 0%, #2d3748 100%);
            border-radius: 16px;
            padding: 50px 40px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
            min-height: 280px;
            position: relative;
            overflow: hidden;
        }

        .banner-slide::before {
            content: '🛒';
            position: absolute;
            right: -30px;
            bottom: -30px;
            font-size: 200px;
            opacity: 0.08;
            transform: rotate(-10deg);
        }

        .banner-text h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .banner-text h1 span {
            color: #f59e0b;
        }

        .banner-text p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin: 12px 0 20px;
            max-width: 500px;
        }

        .banner-badge {
            display: inline-block;
            background: #f59e0b;
            color: #1a2332;
            padding: 4px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .banner-stats {
            display: flex;
            gap: 40px;
            margin-top: 20px;
        }

        .banner-stats .stat {
            text-align: center;
        }

        .banner-stats .stat .number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #f59e0b;
        }

        .banner-stats .stat .label {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* ---------- FLASH SALES (Jumia Style) ---------- */
        .flash-sales {
            max-width: 1280px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a2332;
        }

        .section-header h2 span {
            color: #f59e0b;
        }

        .section-header .timer {
            background: #1a2332;
            color: #fff;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .section-header .timer span {
            color: #f59e0b;
        }

        .section-header .see-all {
            color: #f59e0b;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* ---------- PRODUCT GRID (Jumia/Kilimall Style) ---------- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .product-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            position: relative;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            border-color: #f59e0b;
        }

        .product-card .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e53e3e;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 50px;
            text-transform: uppercase;
        }

        .product-card .badge.sale {
            background: #f59e0b;
        }

        .product-card .badge.hot {
            background: #e53e3e;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .product-card .product-image {
            font-size: 4rem;
            margin: 10px 0;
            display: block;
        }

        .product-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a2332;
            margin: 8px 0 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 40px;
        }

        .product-card .rating {
            color: #f59e0b;
            font-size: 0.85rem;
            margin: 4px 0;
        }

        .product-card .rating span {
            color: #888;
            font-size: 0.75rem;
        }

        .product-card .price {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1a2332;
            margin: 6px 0;
        }

        .product-card .price .old {
            font-size: 0.85rem;
            color: #999;
            text-decoration: line-through;
            font-weight: 400;
            margin-left: 8px;
        }

        .product-card .installment {
            font-size: 0.75rem;
            color: #666;
        }

        .product-card .add-btn {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background: #f59e0b;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .product-card .add-btn:hover {
            background: #d97706;
            transform: scale(1.02);
        }

        .product-card .add-btn.added {
            background: #10b981;
        }

        /* ---------- FEATURES BAR (Kilimall Style) ---------- */
        .features-bar {
            max-width: 1280px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }

        .feature-item {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s;
        }

        .feature-item:hover {
            transform: translateY(-4px);
        }

        .feature-item .icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
        }

        .feature-item h4 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a2332;
        }

        .feature-item p {
            font-size: 0.8rem;
            color: #888;
        }

        /* ---------- CATEGORY SHOWCASE ---------- */
        .category-showcase {
            max-width: 1280px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .category-item {
            background: #fff;
            padding: 20px 10px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            cursor: pointer;
        }

        .category-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            border-color: #f59e0b;
        }

        .category-item .icon {
            font-size: 2.5rem;
            display: block;
        }

        .category-item .name {
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 6px;
            color: #1a2332;
        }

        /* ---------- TESTIMONIALS ---------- */
        .testimonials {
            max-width: 1280px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .testimonial-card {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .testimonial-card .stars {
            color: #f59e0b;
            font-size: 1.1rem;
        }

        .testimonial-card p {
            font-size: 0.95rem;
            margin: 10px 0;
            color: #555;
        }

        .testimonial-card .customer {
            font-weight: 600;
            color: #1a2332;
        }

        .testimonial-card .location {
            font-size: 0.8rem;
            color: #888;
        }

        /* ---------- FOOTER (Jumia Style) ---------- */
        .footer {
            background: #1a2332;
            color: #ccc;
            padding: 40px 0 20px;
            margin-top: 40px;
        }

        .footer .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .footer-grid h4 {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .footer-grid a {
            display: block;
            color: #aaa;
            font-size: 0.85rem;
            margin: 6px 0;
            transition: color 0.3s;
        }

        .footer-grid a:hover {
            color: #f59e0b;
        }

        .footer-bottom {
            border-top: 1px solid #333;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.8rem;
            color: #666;
        }

        .footer-bottom .social {
            display: flex;
            gap: 15px;
        }

        .footer-bottom .social a {
            color: #666;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .footer-bottom .social a:hover {
            color: #f59e0b;
        }

        /* ---------- FLOATING CART (Mobile) ---------- */
        .floating-cart {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #f59e0b;
            color: #fff;
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 8px 30px rgba(245, 158, 11, 0.4);
            z-index: 999;
            cursor: pointer;
            transition: all 0.3s;
        }

        .floating-cart:hover {
            transform: scale(1.05);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 768px) {
            .top-bar .container {
                justify-content: center;
                font-size: 0.7rem;
            }

            .main-header .container {
                gap: 10px;
            }

            .logo {
                font-size: 1.4rem;
            }

            .search-bar {
                order: 3;
                flex-basis: 100%;
                max-width: 100%;
            }

            .header-actions a span {
                display: none;
            }

            .category-nav {
                top: 120px;
            }

            .banner-text h1 {
                font-size: 1.8rem;
            }

            .banner-slide {
                padding: 30px 20px;
                min-height: 200px;
            }

            .banner-stats {
                gap: 20px;
            }

            .banner-stats .stat .number {
                font-size: 1.2rem;
            }

            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .product-card {
                padding: 12px;
            }

            .product-card .product-image {
                font-size: 3rem;
            }

            .product-card h3 {
                font-size: 0.8rem;
                min-height: 32px;
            }

            .product-card .price {
                font-size: 1rem;
            }

            .section-header h2 {
                font-size: 1.2rem;
            }

            .section-header .timer {
                font-size: 0.7rem;
                padding: 4px 12px;
            }

            .floating-cart {
                display: block;
                font-size: 0.9rem;
                padding: 12px 16px;
            }

            .footer-grid {
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
        }

        @media (max-width: 480px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .product-card {
                padding: 8px;
            }

            .product-card .product-image {
                font-size: 2.5rem;
            }

            .banner-text h1 {
                font-size: 1.4rem;
            }

            .banner-text p {
                font-size: 0.9rem;
            }
        }

        /* ---------- SCROLL TO TOP ---------- */
        .scroll-top {
            position: fixed;
            bottom: 80px;
            right: 20px;
